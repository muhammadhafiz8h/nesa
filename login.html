  <title>Login</title>

</form>

<script>
function login(e) {
  e.preventDefault();

  const username = document.querySelector("input[name='username']").value;
  const password = document.querySelector("input[name='password']").value;

  if (username === "nesa" && password === "030307") {
    localStorage.setItem("isLogin", "true");
    window.location.href = "index.html";
  } else {
    alert("Kode rahasia salah 🌸");
  }
}
</script>

</body>

<body class="h-screen flex items-center justify-center bg-[#F0F8FF] overflow-hidden">

<!-- Sakura Canvas -->
<canvas id="sakura-canvas"></canvas>

<!-- Login Card -->
<div class="relative z-10 bg-white/80 backdrop-blur-lg p-10 rounded-2xl shadow-2xl w-[350px] text-center">
  
  <h1 class="text-3xl font-anime text-pink-400 mb-4">
    Haloo Nesa
  </h1>

  <p class="text-gray-600 mb-6">
    Masukkan kode rahasia untuk masuk
  </p>

  <form onsubmit="login(event)" class="space-y-4">
    <input
      type="text"
      name="username"
      placeholder="Username"
      required
      class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-300"
    >

    <input
      type="password"
      name="password"
      placeholder="Secret Code"
      required
      class="w-full px-4 py-3 rounded-xl border border-pink-200 focus:outline-none focus:ring-2 focus:ring-pink-300"
    >

    <button
      type="submit"
      class="w-full py-3 rounded-xl bg-pink-400 text-white font-semibold hover:bg-pink-500 transition">
      Enter
    </button>
  </form>

  <p class="mt-6 text-sm text-gray-500">
    Ada di belakang barcode ya
  </p>
</div>

<script>
const canvas = document.getElementById("sakura-canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let petals = [];

function Petal() {
  this.x = Math.random() * canvas.width;
  this.y = Math.random() * canvas.height;
  this.r = Math.random() * 4 + 2;
  this.dx = Math.random() * 1 + 0.5;
  this.dy = Math.random() * 1 + 0.5;
}

Petal.prototype.draw = function() {
  ctx.beginPath();
  ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,183,197,0.8)";
  ctx.fill();
};

Petal.prototype.update = function() {
  this.x += this.dx;
  this.y += this.dy;
  if (this.y > canvas.height) {
    this.y = -10;
    this.x = Math.random() * canvas.width;
  }
  this.draw();
};

for (let i = 0; i < 60; i++) {
  petals.push(new Petal());
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => p.update());
  requestAnimationFrame(animate);
}

animate();
</script>
